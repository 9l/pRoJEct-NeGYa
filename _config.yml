# 1. Site Settings
url                : "https://gmkzwwg.github.io"
baseurl            : "/pRoJEct-VeXEd"
permalink           : /:title/
markdown            : kramdown

# Site Texts
title               : pRoJEct-VeXEd
owner               : "GMKZWWG"
description         : "A hacker-style note-keeping website template."
statement           : "Designed by gmkzwwg, All Rights Reserved"
archive_btn_text    : Archive
home_btn_text       : Home
# matrix_bg_text             : "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&*+-"


# 2. Your Collections
# You can specify the order shown in Archive window. 
# Keep it null if you want to show items in alphabetic order.
collection_order    : 
  [
    "posts",
    "math",
    "album",
    "physics",
    "biology",
    "finance",
    "physics",
    "my_notes",
    "portfolio",
  ]
collections:
  math:   
    output          : true
    permalink       : /:collection/:title/
    sort_by         : date
    alias           : "Mathematics"
  portfolio:
    output          : true
    permalink       : /:collection/:title/
    order: # specify post order manually
      - portfolio3.md
      - portfolio2.md
      - portfolio1.md
  album:
    output          : true
    permalink       : /:collection/:title/
    sort_by         : date
  physics:
    output          : true
    permalink       : /:collection/:title/
  biology:
    output          : true
    permalink       : /:collection/:title/
  finance:
    output          : true
    permalink       : /:collection/:title/
  my_notes:
    output          : true
    permalink       : /:collection/:title/
    # An alias should be given or the UNDERSCORE will appeared 
    alias           : "My Notes"
  posts:
    output          : true

# 3. Comment settings（disqus.com）
disqus_username     : gmkzwwg

# 4. Default page settings (WILL BE overwriten by front-matters of a page)
defaults:
  -    
    scope:
      path          : ""  # an empty string here means all files in the project
    values:
      layout              : "post"      # "post"/"parallel"/"compact"/"bilingual"/"print"
      btn_text            : true        # whether show button text by default
      collection_list     : true        # whether show archive button by default
      home_btn            : true        # whether show home by default
      maximize            : true        # whether show maximize button by default
      encrypted_text      : false       # whether use encrytion function by default
      toc                 : "chart"     # toc right-up conner: "chart"/"compact"/"list"
      toc_before_content  : false       # toc before content: "chart"/"compact"/"list"
      toc_depth           : 4           # the toc depth by default
      author              :             # author name by default
      show_date           : false       # whether show date message by default
      category            :             # category by default
      post_list           : false       # whether show list of post by default      
      comment             : false
      footer              : false       # whether show footer by default


# 5. Social Media Accounts
email               : "https://github.com/gmkzwwg/pRoJEct-VeXEd" 
linkedin            : 
github              : "just-test" 
gitlab              : 
website             : "https://github.com/gmkzwwg/pRoJEct-VeXEd"
twitter             : "just-test"
facebook            : "just-test"
instagram           : 
youtube             : "just-test"
steam               : "just-test"
weibo               :
      
# 6. Where things are
source              : .
destination         : ./_site
collections_dir     : collections
plugins_dir         : src/_plugins # takes an array of strings and loads plugins in that order
layouts_dir         : src/_layouts
data_dir            : src/_data
includes_dir        : src/_includes
sass:
  sass_dir          : src/_sass

# 7. Plugins
plugins:            # if "Jekyll::Errors::MissingDependencyException" -> Gem install jekyll-xxx
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-mermaid

# 8. JS version
# Search Plugins on: https://cdnjs.com/
# This is functioned in ./src/_includes/head.html
mathjax_version     : # "3.2.2"
katex_version       : "0.16.9"
mermaid_version     : "11.12.0"
fontawesome_version : "4.6.0"

# 9. kramdown settings
kramdown:
#  parse_block_html: true

# 10. Others
# Cross-Origin Resource Sharing header
webrick:
  headers:
   Access-Control-Allow-Origin: "*"
